{% extends "base.html" %}
{% block title %}FaceWatch — Ficha{% endblock %}

{% block content %}
<style>
.person-grid {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 16px;
  max-width: 1000px;
  margin: 0 auto;
}
@media (max-width: 768px) {
  .person-grid { grid-template-columns: 1fr; }
}
.person-face-img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border2);
  display: block;
}
.person-face-placeholder {
  width: 100%;
  aspect-ratio: 1;
  background: var(--panel2);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border2);
  display: grid;
  place-items: center;
  font-size: 64px;
}
.data-row {
  display: flex;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.data-row:last-child { border-bottom: none; }
.data-label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); width: 120px; flex-shrink: 0; padding-top: 2px; }
.data-value { color: var(--text); font-size: 14px; flex: 1; }
.occ-item {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
}
.occ-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.occ-type { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); }
.occ-date { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
.occ-loc { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
.occ-desc { font-size: 13px; color: var(--text); }

.face-photos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 6px;
  margin-top: 8px;
}
.face-photo-item {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius);
  overflow: hidden;
  border: 2px solid var(--ok);
  cursor: pointer;
}
.face-photo-item img { width:100%;height:100%;object-fit:cover;display:block; }
.face-photo-item .del-btn {
  position: absolute;
  top: 2px; right: 2px;
  width: 18px; height: 18px;
  background: rgba(255,59,85,.8);
  border: none; border-radius: 50%;
  color: #fff; font-size: 11px;
  cursor: pointer; display: none;
  align-items: center; justify-content: center;
  line-height: 1;
}
.face-photo-item:hover .del-btn { display: flex; }
.face-photo-add {
  aspect-ratio: 1;
  border-radius: var(--radius);
  border: 2px dashed var(--border2);
  background: var(--panel2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: var(--trans);
  font-size: 20px; color: var(--text-dim);
}
.face-photo-add:hover { border-color: var(--accent); color: var(--accent); }
.face-count-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  margin-left: auto;
}
.face-count-ok   { background: rgba(0,230,118,.1); color: var(--ok); }
.face-count-warn { background: rgba(255,170,0,.1);  color: var(--warn); }

.extra-photos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 8px; }
.extra-photo { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border2); cursor: pointer; }
</style>

<div style="max-width:1000px;margin:0 auto">
  <!-- Breadcrumb -->
  <div class="flex items-center gap-2 mb-4" style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">
    <a href="/search" style="color:var(--text-dim)">← BUSCA</a>
    <span>/</span>
    <span id="bc-name" class="text-accent">CARREGANDO...</span>
  </div>

  <div id="person-content">
    <div class="empty-state"><span class="spinner"></span></div>
  </div>
</div>

<!-- Occurrence modal -->
<div class="modal-overlay" id="occ-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">➕ Nova Ocorrência</span>
      <button class="modal-close" onclick="closeModal('occ-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select id="occ-type" class="form-select">
          <option value="abordagem">Abordagem</option>
          <option value="detencao">Detenção</option>
          <option value="observacao">Observação</option>
          <option value="apreensao">Apreensão</option>
          <option value="outro">Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Local</label>
        <input type="text" id="occ-location" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea id="occ-desc" class="form-textarea" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Substâncias</label>
        <input type="text" id="occ-subs-input" class="form-input" placeholder="Digite e pressione Enter">
        <div class="tag-list" id="occ-subs-tags"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('occ-modal')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="saveOcc()">Salvar</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ Editar Cadastro</span>
      <button class="modal-close" onclick="closeModal('edit-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nível de Risco</label>
          <select id="edit-risk" class="form-select">
            <option value="low">Baixo</option>
            <option value="medium">Médio</option>
            <option value="high">Alto</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="edit-status" class="form-select">
            <option value="active">Ativo</option>
            <option value="detained">Detido</option>
            <option value="fugitive">Foragido</option>
            <option value="released">Liberado</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Observações</label>
        <textarea id="edit-obs" class="form-textarea" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('edit-modal')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const PERSON_ID = {{ person_id }};
let _person = null;
let _occSubsTI;

async function load() {
  _person = await API.get(`/api/persons/${PERSON_ID}`);
  if (_person.error) {
    document.getElementById('person-content').innerHTML = `<div class="empty-state"><span class="icon">❌</span>${_person.error}</div>`;
    return;
  }
  document.getElementById('bc-name').textContent = _person.name.toUpperCase();
  render();

  _occSubsTI = TagInput(null, document.getElementById('occ-subs-input'), document.getElementById('occ-subs-tags'));
}

function render() {
  const p = _person;
  const places    = p.frequent_places || [];
  const subs      = p.substances || [];
  const extras    = p.extra_photos || [];
  const occs      = (p.occurrences || []).sort((a, b) => b.created_at > a.created_at ? 1 : -1);

  document.getElementById('person-content').innerHTML = `
    <div class="person-grid">
      <!-- LEFT: photo + actions -->
      <div>
        ${p.face_photo
          ? `<img src="${imgUrl(p.face_photo)}" class="person-face-img" alt="${p.name}">`
          : `<div class="person-face-placeholder">👤</div>`}

        <!-- Fotos de rosto cadastradas -->
        <div style="margin-top:10px">
          <div class="flex items-center mb-2">
            <span class="mono text-xs text-dim">FOTOS DE ROSTO</span>
            <span class="face-count-badge ${(p.face_photos||[]).length >= 3 ? 'face-count-ok' : 'face-count-warn'}">
              ${(p.face_photos||[]).length}/5
            </span>
          </div>
          <div class="face-photos-grid" id="face-photos-grid">
            ${(p.face_photos||[]).map((ph, i) => `
              <div class="face-photo-item">
                <img src="${imgUrl(ph)}" alt="Rosto ${i+1}">
                <button class="del-btn" onclick="deleteFacePhoto(${i})" title="Remover">×</button>
              </div>
            `).join('')}
            ${(p.face_photos||[]).length < 5 ? `
              <label class="face-photo-add" title="Adicionar foto de rosto">
                +
                <input type="file" accept="image/*" onchange="uploadFace(event)" style="display:none">
              </label>
            ` : ''}
          </div>
          ${(p.face_photos||[]).length < 3 ? `
            <p class="mono text-xs" style="color:var(--warn);margin-top:6px">
              ⚠ Adicione ${3-(p.face_photos||[]).length} foto(s) para melhorar o reconhecimento
            </p>` : ''}
        </div>

        <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-ghost btn-block" onclick="openOccModal()">➕ OCORRÊNCIA</button>
          <button class="btn btn-ghost btn-block" onclick="openEditModal()">✏️ EDITAR</button>
          <button class="btn btn-danger btn-block btn-sm" onclick="deletePerson()">🗑 EXCLUIR</button>
        </div>

        ${extras.length ? `
          <p class="section-title" style="margin-top:16px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:6px;">Fotos Extras</p>
          <div class="extra-photos-grid">
            ${extras.map(ph => `<img src="${imgUrl(ph)}" class="extra-photo" onclick="window.open('${imgUrl(ph)}','_blank')">`).join('')}
          </div>
        ` : ''}
      </div>

      <!-- RIGHT: data + occurrences -->
      <div>
        <div class="card mb-3">
          <div class="flex items-center justify-between mb-3">
            <h1 style="font-size:22px">${p.name}</h1>
            <div class="flex gap-2">
              ${riskBadge(p.risk_level)}
              ${statusBadge(p.status)}
            </div>
          </div>
          ${p.nickname ? `<p class="mono text-dim text-sm mb-3">"${p.nickname}"</p>` : ''}

          <div>
            ${row('Gênero',       p.gender)}
            ${row('Idade',        p.age && p.age + ' anos')}
            ${row('Cor de Pele',  p.skin_color)}
            ${row('Altura',       p.height_cm && p.height_cm + ' cm')}
            ${row('Endereço',     p.address)}
            ${places.length ? row('Locais Freq.',  places.map(t => `<span class="tag" style="display:inline-flex">${t}</span>`).join(' ')) : ''}
            ${subs.length   ? row('Substâncias',   subs.map(t => `<span class="tag" style="display:inline-flex">${t}</span>`).join(' ')) : ''}
            ${row('Tatuagens',    p.tattoos)}
            ${row('Marcas Fís.',  p.physical_marks)}
            ${row('Observações',  p.observations)}
            ${row('Cadastrado',   p.created_at ? new Date(p.created_at).toLocaleDateString('pt-BR') : null)}
          </div>
        </div>

        <!-- Occurrences -->
        <div class="card">
          <div class="card-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <h2>Ocorrências</h2>
            <span class="subtitle">${occs.length} registro${occs.length !== 1 ? 's' : ''}</span>
          </div>

          ${occs.length === 0 ? '<div class="empty-state" style="padding:24px"><span class="icon" style="font-size:28px">📋</span>Nenhuma ocorrência</div>' : ''}
          ${occs.map(o => `
            <div class="occ-item">
              <div class="occ-header">
                <span class="occ-type">${o.type || 'Ocorrência'}</span>
                <span class="occ-date">${o.created_at ? new Date(o.created_at).toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}</span>
              </div>
              ${o.location ? `<div class="occ-loc">📍 ${o.location}</div>` : ''}
              ${o.description ? `<div class="occ-desc">${o.description}</div>` : ''}
              ${o.registered_by ? `<div class="mono text-xs text-dim" style="margin-top:4px">Por: ${o.registered_by}</div>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function row(label, value) {
  if (!value) return '';
  return `<div class="data-row"><span class="data-label">${label}</span><div class="data-value">${value}</div></div>`;
}

function openOccModal() {
  document.getElementById('occ-location').value = '';
  document.getElementById('occ-desc').value = '';
  _occSubsTI.set([]);
  openModal('occ-modal');
}

async function saveOcc() {
  const res = await API.post(`/api/persons/${PERSON_ID}/occurrences`, {
    type:        document.getElementById('occ-type').value,
    location:    document.getElementById('occ-location').value,
    description: document.getElementById('occ-desc').value,
    substances:  _occSubsTI.get(),
  });
  if (res.id) {
    toast('Ocorrência registrada!', 'success');
    closeModal('occ-modal');
    _person = await API.get(`/api/persons/${PERSON_ID}`);
    render();
  } else {
    toast('Erro ao salvar', 'error');
  }
}

function openEditModal() {
  document.getElementById('edit-risk').value   = _person.risk_level;
  document.getElementById('edit-status').value = _person.status;
  document.getElementById('edit-obs').value    = _person.observations || '';
  openModal('edit-modal');
}

async function saveEdit() {
  const res = await API.put(`/api/persons/${PERSON_ID}`, {
    risk_level:   document.getElementById('edit-risk').value,
    status:       document.getElementById('edit-status').value,
    observations: document.getElementById('edit-obs').value,
  });
  if (res.id) {
    toast('Atualizado!', 'success');
    closeModal('edit-modal');
    _person = await API.get(`/api/persons/${PERSON_ID}`);
    render();
  } else {
    toast('Erro ao salvar', 'error');
  }
}

async function uploadFace(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  ev.target.value = '';

  const faces = _person.face_photos || [];
  if (faces.length >= 5) { toast('Limite de 5 fotos atingido', 'warn'); return; }

  const b64 = await new Promise((res, rej) => {
    const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = rej; r.readAsDataURL(file);
  });

  toast('Enviando foto...', 'info', 8000);
  const result = await API.post(`/api/persons/${PERSON_ID}/photo/face`, { image_b64: b64 });
  if (result.ok) {
    const total = result.total || (faces.length + 1);
    toast(`Foto adicionada (${total}/5)! ${total >= 3 ? 'Treinando modelo...' : 'Adicione mais ' + (3-total) + ' foto(s).'}`, 'success', 4000);
    _person = await API.get(`/api/persons/${PERSON_ID}`);
    render();
  } else {
    toast('Erro: ' + (result.error || 'desconhecido'), 'error');
  }
}

async function deleteFacePhoto(idx) {
  if (!confirm('Remover esta foto de rosto?')) return;
  const result = await API.del(`/api/persons/${PERSON_ID}/photo/face/${idx}`);
  if (result.ok) {
    toast(`Foto removida (${result.total}/5)`, 'warn');
    _person = await API.get(`/api/persons/${PERSON_ID}`);
    render();
  } else {
    toast('Erro: ' + (result.error || 'desconhecido'), 'error');
  }
}

async function deletePerson() {
  if (!confirm(`Excluir ${_person.name}? Esta ação não pode ser desfeita.`)) return;
  const res = await API.del(`/api/persons/${PERSON_ID}`);
  if (res.ok) {
    toast('Excluído.', 'warn');
    setTimeout(() => location.href = '/search', 1000);
  } else {
    toast('Erro ao excluir', 'error');
  }
}

load();
</script>
{% endblock %}
